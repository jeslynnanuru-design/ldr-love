<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hai kamu 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    text-align: center;
    background: black;
    color: white;
    overflow: hidden;
}

.section { display: none; }
.active { display: block; }

img {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin : 100px auto 0 auto;
    border: 4px solid white;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

/* love jatuh */
.heart {
    position: fixed;
    top: -10px;
    color: white;
    animation: jatuh 5s linear infinite;
}

@keyframes jatuh {
    0% { transform: translateY(-10px); }
    100% { transform: translateY(100vh); }
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

#typing, #textAwal {
    font-size: 22px;
    min-height: 40px;
    margin-top: 50px;
    margin-bottom: 15px;
    text-align: center;
}
</style>
</head>

<body>

<!-- HALAMAN 1 -->
<div id="hal1" class="section active">
    <h2 id="textAwal"></h2>
    <img id="fotoAku" src="WhatsApp Image 2026-03-25 at 13.56.49.jpeg" style="display:none;">
    <br>
    <button id="btnNext" onclick="nextPage()" style="display:none;">Klik ya 😆</button>
</div>

<!-- HALAMAN 2 -->
<div id="hal2" class="section">
    <img src="WhatsApp Image 2026-03-25 at 13.56.50 (1).jpeg">
    <h2 id="typing"></h2>
    <button onclick="showCode()">Klik 🤍</button>
</div>

<!-- HALAMAN 3 -->
<div id="hal3" class="section">
    <h2>Masukkan Kode Rahasia 🔐</h2>
    <input type="password" id="kode">
    <br>
    <button onclick="cekKode()">Buka 💌</button>
</div>

<!-- HALAMAN 4 -->
<div id="hal4" class="section">
    <h2>Untuk Kamu 💖</h2>

    <!-- PAP -->
    <div id="papContainer"></div>

    <!-- PESAN -->
    <p id="pesanAkhir"></p>
</div>

<!-- LAGU -->
<audio id="lagu" autoplay loop>
    <source src="lagu.mp3.mp3" type="audio/mpeg">
</audio>

<script>
// TEXT AWAL
const awalText = "Aku punya sesuatu buat kamu... 💖";
let k = 0;

function ketikAwal() {
    if (k < awalText.length) {
        document.getElementById("textAwal").innerHTML += awalText.charAt(k);
        k++;
        setTimeout(ketikAwal, 50);
    } else {
        document.getElementById("fotoAku").style.display = "block";
        document.getElementById("btnNext").style.display = "inline-block";
    }
}
ketikAwal();

// PINDAH HALAMAN
function nextPage() {
    document.getElementById("hal1").classList.remove("active");
    document.getElementById("hal2").classList.add("active");
    document.getElementById("lagu").play();
    ketikText();
}

// TYPING DIA
const text = "Hallo Sayangnya akuhhh 💙";
let i = 0;

function ketikText() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(ketikText, 50);
    }
}

// LOVE JATUH
function buatLove() {
    const love = document.createElement("div");
    love.classList.add("heart");
    love.innerHTML = "🤍";
    love.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(love);
    setTimeout(() => love.remove(), 5000);
}

// SHOW KODE
function showCode() {
    document.getElementById("hal2").classList.remove("active");
    document.getElementById("hal3").classList.add("active");
    setInterval(buatLove, 300);
}

// CEK KODE
function cekKode() {
    let kode = document.getElementById("kode").value;

    if (kode.toLowerCase() === "08-01-26") {
        document.getElementById("hal3").classList.remove("active");
        document.getElementById("hal4").classList.add("active");

        tampilPap();
        ketikAkhir();
    } else {
        alert("Kode salah 😭");
    }
}

// PAP FOTO
function tampilPap() {
    const pap = [
        {"WhatsApp Image 2026-03-25 at 14.34.01.jpeg", text : lucu kann 😁 },
        {"WhatsApp Image 2026-03-25 at 14.34.02.jpeg", text : semangat kerjanya ❤️ },
        {"WhatsApp Image 2026-03-25 at 09.11.44.jpeg", text : sehat - sehat disana },
        {"WhatsApp Image 2026-03-22 at 21.53.15.jpeg", text : sama - sama terus yaahhh 😁},
    ];

    let container = document.getElementById("papContainer");

    pap.forEach((item, index) => {
        let div = document.createElement("div");
        div.classList.add("pap-item");

        let img = document.createElement("img");
        img.src = item.img;

        let text = document.createElement("div");
        text.classList.add("pap-text");
        text.innerText = item.text;

        div.appendChild(img);
        div.appendChild(text);
        container.appendChild(div);

        // animasi muncul satu-satu
        setTimeout(() => {
            div.classList.add("show");
        }, index * 1500);
    });
}

// PESAN AKHIR
const akhir = "IK HOU VAN JOU💙 ";
let j = 0;

function ketikAkhir() {
    if (j < akhir.length) {
        document.getElementById("pesanAkhir").innerHTML += akhir.charAt(j);
        j++;
        setTimeout(ketikAkhir, 50);
    }
}
</script>

</body>
</html>
